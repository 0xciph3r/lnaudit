<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lnaudit Documentation</title>
  <meta
    name="description"
    content="Enterprise Security Documentation for lnaudit, a Security Auditing Tool for Lightning Network Daemon (LND) nodes."
  />
</head>
<body>
  <div id="root"></div>
  <noscript>This page requires JavaScript to render the Chakra UI documentation experience.</noscript>

  <script type="module">
    import React from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";
    import {
      ChakraProvider,
      extendTheme,
      Box,
      Flex,
      Stack,
      HStack,
      VStack,
      Heading,
      Text,
      Link,
      Badge,
      Button,
      Grid,
      GridItem,
      Table,
      Thead,
      Tbody,
      Tr,
      Th,
      Td,
      TableContainer,
      ListItem,
      UnorderedList,
      OrderedList,
      Code,
      Divider
    } from "https://esm.sh/@chakra-ui/react@2.10.2?deps=react@18.3.1,react-dom@18.3.1";

    const html = htm.bind(React.createElement);

    const palette = {
      eggshell: "#F4F0E8",
      powderBlush: "#F6DEE5",
      icyAqua: "#DAF3F1",
      blueSlate: "#4E6383",
      lightBlue: "#BFD8FF"
    };

    const theme = extendTheme({
      styles: {
        global: {
          body: {
            bg: palette.eggshell,
            color: "brand.blueSlate",
            lineHeight: "tall"
          }
        }
      },
      colors: {
        brand: {
          eggshell: palette.eggshell,
          powderBlush: palette.powderBlush,
          icyAqua: palette.icyAqua,
          blueSlate: palette.blueSlate,
          lightBlue: palette.lightBlue
        }
      },
      fonts: {
        heading: "Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif",
        body: "Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif",
        mono: "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      }
    });

    const navItems = [
      ["Overview", "#overview"],
      ["Installation", "#installation"],
      ["Usage", "#usage"],
      ["Security Checks", "#checks"],
      ["Output", "#output"],
      ["Scoring Model", "#scoring"],
      ["Architecture", "#architecture"],
      ["Development", "#development"],
      ["Roadmap", "#roadmap"]
    ];

    const codeBlock = (content) => html`
      <${Box}
        as="pre"
        bg="brand.blueSlate"
        color="white"
        borderRadius="12px"
        p="14px"
        overflowX="auto"
        fontSize="0.85rem"
        fontFamily="mono"
        lineHeight="1.65"
        border="1px solid"
        borderColor="brand.lightBlue"
      >${content}</${Box}>
    `;

    const Logo = () => html`
      <${HStack} spacing="10px">
        <${Box}
          w="34px"
          h="34px"
          borderRadius="10px"
          bg="brand.blueSlate"
          display="inline-flex"
          alignItems="center"
          justifyContent="center"
          boxShadow="0 8px 16px rgba(78, 99, 131, 0.24)"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2L4 6V11C4 16.3 7.4 21 12 22C16.6 21 20 16.3 20 11V6L12 2Z" fill="#DAF3F1"></path>
            <path d="M11 7L8.8 12H11.2L10 17L15 10.6H12.7L14 7H11Z" fill="#4E6383"></path>
          </svg>
        </${Box}>
        <${VStack} align="start" spacing="0">
          <${Text} fontWeight="800" letterSpacing="0.2px" color="brand.blueSlate">lnaudit</${Text}>
          <${Text} fontSize="0.76rem" color="brand.blueSlate" opacity="0.82">Security Documentation</${Text}>
        </${VStack}>
      </${HStack}>
    `;

    const SectionCard = ({ id, title, children }) => html`
      <${Box}
        as="section"
        id=${id}
        bg="white"
        border="1px solid"
        borderColor="brand.lightBlue"
        borderRadius="16px"
        p=${["18px", "22px", "24px"]}
        boxShadow="0 10px 24px rgba(78, 99, 131, 0.08)"
      >
        <${Heading} as="h2" size="lg" color="brand.blueSlate" mb="14px">${title}</${Heading}>
        ${children}
      </${Box}>
    `;

    const App = () => html`
      <${Box}>
        <${Box}
          as="header"
          position="sticky"
          top="0"
          zIndex="20"
          bg="rgba(244, 240, 232, 0.94)"
          backdropFilter="blur(6px)"
          borderBottom="1px solid"
          borderColor="brand.lightBlue"
        >
          <${Flex}
            maxW="1200px"
            mx="auto"
            px=${["14px", "20px", "24px"]}
            py="12px"
            align="center"
            justify="space-between"
            gap="12px"
          >
            <${Logo} />
            <${HStack} spacing="8px">
              <${Button}
                as="a"
                href="https://github.com/NonsoAmadi10/lnaudit/releases"
                variant="outline"
                borderColor="brand.blueSlate"
                color="brand.blueSlate"
                size="sm"
              >Releases</${Button}>
              <${Button}
                as="a"
                href="https://github.com/NonsoAmadi10/lnaudit"
                bg="brand.blueSlate"
                color="white"
                _hover=${{ bg: "#42566f" }}
                size="sm"
              >GitHub</${Button}>
            </${HStack}>
          </${Flex}>
        </${Box}>

        <${Grid}
          maxW="1200px"
          mx="auto"
          px=${["14px", "20px", "24px"]}
          py="20px"
          templateColumns=${["1fr", "1fr", "260px minmax(0, 1fr)"]}
          gap="18px"
        >
          <${GridItem}>
            <${Box}
              position=${["static", "static", "sticky"]}
              top="82px"
              bg="white"
              border="1px solid"
              borderColor="brand.lightBlue"
              borderRadius="14px"
              p="12px"
            >
              <${Text}
                fontSize="0.72rem"
                textTransform="uppercase"
                letterSpacing="0.09em"
                fontWeight="700"
                color="brand.blueSlate"
                opacity="0.78"
                mb="8px"
              >
                Documentation
              </${Text}>
              <${VStack} align="stretch" spacing="3px">
                ${navItems.map(([label, href]) => html`
                  <${Link}
                    key=${href}
                    href=${href}
                    px="9px"
                    py="7px"
                    borderRadius="9px"
                    color="brand.blueSlate"
                    _hover=${{ bg: "brand.icyAqua", textDecoration: "none" }}
                    fontWeight="500"
                  >${label}</${Link}>
                `)}
              </${VStack}>
            </${Box}>
          </${GridItem}>

          <${GridItem}>
            <${Stack} spacing="16px">
              <${Box}
                id="overview"
                bg="white"
                border="1px solid"
                borderColor="brand.lightBlue"
                borderRadius="16px"
                p=${["18px", "22px", "24px"]}
                boxShadow="0 10px 24px rgba(78, 99, 131, 0.08)"
                backgroundImage="linear-gradient(135deg, rgba(191,216,255,0.18), rgba(218,243,241,0.22))"
              >
                <${Badge} bg="brand.powderBlush" color="brand.blueSlate" px="8px" py="4px" borderRadius="full">
                  Enterprise Security Tooling
                </${Badge}>
                <${Heading} as="h1" size="2xl" lineHeight="1.08" mt="12px" mb="12px" color="brand.blueSlate">
                  lnaudit for Lightning Node Security
                </${Heading}>
                <${Text} color="brand.blueSlate" opacity="0.9" fontSize="1.03rem" maxW="860px">
                  lnaudit performs configuration-level security auditing for Lightning Network Daemon (LND) nodes.
                  It reviews sensitive file permissions, transport and API exposure, Tor and privacy posture, and
                  high-risk operational flags. Each scan produces a scored report with remediation guidance.
                </${Text}>

                <${Grid} templateColumns=${["1fr", "repeat(2, 1fr)", "repeat(3, 1fr)"]} gap="10px" mt="14px">
                  <${Box} bg="brand.eggshell" borderRadius="12px" p="10px" border="1px solid" borderColor="brand.lightBlue">
                    <${Text} fontSize="0.75rem" textTransform="uppercase" fontWeight="700" color="brand.blueSlate" opacity="0.75">Current Version</${Text}>
                    <${Text} fontWeight="700" color="brand.blueSlate">v0.1.0</${Text}>
                  </${Box}>
                  <${Box} bg="brand.eggshell" borderRadius="12px" p="10px" border="1px solid" borderColor="brand.lightBlue">
                    <${Text} fontSize="0.75rem" textTransform="uppercase" fontWeight="700" color="brand.blueSlate" opacity="0.75">Scan Scope</${Text}>
                    <${Text} fontWeight="700" color="brand.blueSlate">Configuration and File System</${Text}>
                  </${Box}>
                  <${Box} bg="brand.eggshell" borderRadius="12px" p="10px" border="1px solid" borderColor="brand.lightBlue">
                    <${Text} fontSize="0.75rem" textTransform="uppercase" fontWeight="700" color="brand.blueSlate" opacity="0.75">Deployment</${Text}>
                    <${Text} fontWeight="700" color="brand.blueSlate">CLI, CI/CD, GitHub Actions</${Text}>
                  </${Box}>
                </${Grid}>

                <${HStack} spacing="8px" mt="14px" flexWrap="wrap">
                  <a href="https://github.com/NonsoAmadi10/lnaudit/actions/workflows/ci.yml"><img src="https://github.com/NonsoAmadi10/lnaudit/actions/workflows/ci.yml/badge.svg" alt="CI" /></a>
                  <a href="https://goreportcard.com/report/github.com/NonsoAmadi10/lnaudit"><img src="https://goreportcard.com/badge/github.com/NonsoAmadi10/lnaudit" alt="Go Report Card" /></a>
                  <img src="https://img.shields.io/badge/License-MIT-blue.svg" alt="MIT License" />
                  <a href="https://github.com/NonsoAmadi10/lnaudit/releases"><img src="https://img.shields.io/github/v/release/NonsoAmadi10/lnaudit" alt="Release" /></a>
                </${HStack}>
              </${Box}>

              <${SectionCard} id="installation" title="Installation">
                <${Text}>Choose an installation path based on your operating model.</${Text}>
                <${Heading} as="h3" size="sm">Prerequisites</${Heading}>
                <${UnorderedList}>
                  <${ListItem}>Go 1.23 or later</${ListItem}>
                  <${ListItem}>Read access to the LND directory</${ListItem}>
                  <${ListItem}>A running LND process is not required for configuration-only scans</${ListItem}>
                </${UnorderedList}>
                <${Heading} as="h3" size="sm">Install from Source</${Heading}>
                ${codeBlock("go install github.com/NonsoAmadi10/lnaudit@latest")}
                <${Heading} as="h3" size="sm">Build Locally</${Heading}>
                ${codeBlock(`git clone https://github.com/NonsoAmadi10/lnaudit.git
cd lnaudit
make build
./bin/lnaudit version`)}
              </${SectionCard}>

              <${SectionCard} id="usage" title="Usage">
                <${Heading} as="h3" size="sm">Run Scans</${Heading}>
                ${codeBlock(`# Auto-detect LND path
lnaudit scan

# Explicit config path
lnaudit scan --config /path/to/lnd.conf

# Explicit LND directory
lnaudit scan --lnddir /path/to/.lnd`)}
                <${Heading} as="h3" size="sm">Output Controls</${Heading}>
                ${codeBlock(`# Table output
lnaudit scan --format table

# JSON output
lnaudit scan --format json

# Show HIGH and CRITICAL only
lnaudit scan --min-severity high

# Include INFO findings
lnaudit scan --verbose

# Fail pipeline on HIGH+
lnaudit scan --fail-on high --format json`)}
                <${Heading} as="h3" size="sm">Primary Flags</${Heading}>
                <${TableContainer}>
                  <${Table} size="sm" variant="simple">
                    <${Thead}>
                      <${Tr}><${Th}>Flag</${Th}><${Th}>Default</${Th}><${Th}>Description</${Th}></${Tr}>
                    </${Thead}>
                    <${Tbody}>
                      <${Tr}><${Td}><${Code}>--config</${Code}></${Td}><${Td}>Auto-detect</${Td}><${Td}>Path to lnd.conf</${Td}></${Tr}>
                      <${Tr}><${Td}><${Code}>--lnddir</${Code}></${Td}><${Td}>Auto-detect</${Td}><${Td}>Path to LND directory</${Td}></${Tr}>
                      <${Tr}><${Td}><${Code}>--format</${Code}></${Td}><${Td}>table</${Td}><${Td}>table or json</${Td}></${Tr}>
                      <${Tr}><${Td}><${Code}>--min-severity</${Code}></${Td}><${Td}>low</${Td}><${Td}>Minimum severity to display</${Td}></${Tr}>
                      <${Tr}><${Td}><${Code}>--fail-on</${Code}></${Td}><${Td}>critical</${Td}><${Td}>Exit 1 at threshold</${Td}></${Tr}>
                    </${Tbody}>
                  </${Table}>
                </${TableContainer}>
              </${SectionCard}>

              <${SectionCard} id="checks" title="Security Checks">
                <${Text}>Checks are organized into transport, key management, access control, privacy, and channel safety modules.</${Text}>
                <${TableContainer} mt="10px">
                  <${Table} size="sm" variant="simple">
                    <${Thead}>
                      <${Tr}><${Th}>Module</${Th}><${Th}>Representative Checks</${Th}><${Th}>Severity</${Th}></${Tr}>
                    </${Thead}>
                    <${Tbody}>
                      <${Tr}><${Td}>Transport Security</${Td}><${Td}>TLS expiry, API bind exposure, external IP leakage, NAT/UPnP</${Td}><${Td}>CRITICAL to MEDIUM</${Td}></${Tr}>
                      <${Tr}><${Td}>Key Management</${Td}><${Td}>wallet.db mode, tls.key mode, macaroon file permissions, symlink detection</${Td}><${Td}>CRITICAL to HIGH</${Td}></${Tr}>
                      <${Tr}><${Td}>Access Control</${Td}><${Td}>no-macaroons, debug risk flags, unsafe operational options</${Td}><${Td}>CRITICAL to LOW</${Td}></${Tr}>
                      <${Tr}><${Td}>Network Privacy</${Td}><${Td}>Tor bypass, stream isolation, onion key posture</${Td}><${Td}>HIGH to MEDIUM</${Td}></${Tr}>
                      <${Tr}><${Td}>Channel Safety</${Td}><${Td}>Watchtower posture, confirmation depth, channel sizing limits</${Td}><${Td}>HIGH to LOW</${Td}></${Tr}>
                    </${Tbody}>
                  </${Table}>
                </${TableContainer}>
              </${SectionCard}>

              <${SectionCard} id="output" title="Output">
                <${Heading} as="h3" size="sm">Example Table Output</${Heading}>
                ${codeBlock(`$ lnaudit scan --config ~/.lnd/lnd.conf

lnaudit v0.1.0

  CRITICAL  wallet.db has permissions 0644 (too permissive)
            chmod 0600 ~/.lnd/data/chain/bitcoin/mainnet/wallet.db

  HIGH      REST listener on non-loopback address: 192.168.1.10:8080
            Change restlisten to 127.0.0.1:<port> unless remote access is intentional.

  MEDIUM    NAT traversal (UPnP) is enabled
            Remove nat=true from lnd.conf and configure forwarding manually.

Score: 41/100  Needs Hardening`)}
                <${Heading} as="h3" size="sm">Example JSON Output</${Heading}>
                ${codeBlock(`{
  "score": 41,
  "rating": "needs_hardening",
  "summary": {
    "critical": 1,
    "high": 1,
    "medium": 1,
    "low": 0,
    "info": 0
  }
}`)}
              </${SectionCard}>

              <${SectionCard} id="scoring" title="Scoring Model">
                <${Text}>The score begins at 100 and deducts points by severity, with a minimum floor of 0.</${Text}>
                <${TableContainer} mt="10px">
                  <${Table} size="sm" variant="simple">
                    <${Thead}><${Tr}><${Th}>Severity</${Th}><${Th}>Deduction</${Th}><${Th}>Interpretation</${Th}></${Tr}></${Thead}>
                    <${Tbody}>
                      <${Tr}><${Td}>CRITICAL</${Td}><${Td}>-15</${Td}><${Td}>Direct fund or credential risk</${Td}></${Tr}>
                      <${Tr}><${Td}>HIGH</${Td}><${Td}>-10</${Td}><${Td}>Major security weakness</${Td}></${Tr}>
                      <${Tr}><${Td}>MEDIUM</${Td}><${Td}>-5</${Td}><${Td}>Meaningful hardening gap</${Td}></${Tr}>
                      <${Tr}><${Td}>LOW</${Td}><${Td}>-2</${Td}><${Td}>Minor hardening opportunity</${Td}></${Tr}>
                      <${Tr}><${Td}>INFO</${Td}><${Td}>0</${Td}><${Td}>Informational only</${Td}></${Tr}>
                    </${Tbody}>
                  </${Table}>
                </${TableContainer}>
                <${Text} mt="8px" fontSize="0.95rem">
                  Output filters affect display only. The score always reflects the complete unfiltered finding set.
                </${Text}>
              </${SectionCard}>

              <${SectionCard} id="architecture" title="Architecture">
                ${codeBlock(`lnaudit/
├── cmd/                    # CLI commands
├── pkg/
│   ├── scanner/            # Finding model and score engine
│   ├── checks/             # Security checks
│   ├── config/             # lnd.conf parser
│   ├── lndpath/            # LND path discovery
│   └── report/             # Table and JSON writers
├── docs/                   # Published docs and research
├── Makefile                # build, test, lint, release
└── .github/workflows/      # CI, release, docs deployment`)}
              </${SectionCard}>

              <${SectionCard} id="development" title="Development">
                ${codeBlock(`# Install development tools
make dev-deps

# Run quality gate
make check

# Build binary
make build

# Run tests with race detector
make test-race

# Generate coverage
make coverage`)}
                <${Heading} as="h3" size="sm">Add a New Check</${Heading}>
                <${OrderedList}>
                  <${ListItem}>Add check logic in <${Code}>pkg/checks</${Code}></${ListItem}>
                  <${ListItem}>Return structured <${Code}>[]scanner.Finding</${Code}></${ListItem}>
                  <${ListItem}>Wire check into <${Code}>cmd/scan.go</${Code}></${ListItem}>
                  <${ListItem}>Add test coverage in matching <${Code}>_test.go</${Code}></${ListItem}>
                  <${ListItem}>Run <${Code}>make check</${Code}> before opening a PR</${ListItem}>
                </${OrderedList}>
                <${Text}>
                  Contributor guidelines: <${Link} href="https://github.com/NonsoAmadi10/lnaudit/blob/main/CONTRIBUTING.md">CONTRIBUTING.md</${Link}>
                </${Text}>
              </${SectionCard}>

              <${SectionCard} id="roadmap" title="Roadmap">
                <${TableContainer}>
                  <${Table} size="sm" variant="simple">
                    <${Thead}><${Tr}><${Th}>Version</${Th}><${Th}>Capability</${Th}><${Th}>Status</${Th}></${Tr}></${Thead}>
                    <${Tbody}>
                      <${Tr}><${Td}>v0.1.0</${Td}><${Td}>Config-based security scanning and scored reporting</${Td}><${Td}>Released</${Td}></${Tr}>
                      <${Tr}><${Td}>v0.2.0</${Td}><${Td}>Live node security scanning via gRPC</${Td}><${Td}>In Progress</${Td}></${Tr}>
                      <${Tr}><${Td}>v0.2.0</${Td}><${Td}>SARIF output for security tooling pipelines</${Td}><${Td}>Planned</${Td}></${Tr}>
                      <${Tr}><${Td}>Future</${Td}><${Td}>Fleet-level scanning across multiple nodes</${Td}><${Td}>Planned</${Td}></${Tr}>
                    </${Tbody}>
                  </${Table}>
                </${TableContainer}>
              </${SectionCard}>

              <${Box} textAlign="center" py="8px">
                <${Divider} borderColor="brand.lightBlue" mb="10px" />
                <${Text} fontSize="0.9rem" color="brand.blueSlate" opacity="0.85">
                  lnaudit is open source under the MIT License.
                  <${Text} as="span"> </${Text}>
                  <${Link} href="https://github.com/NonsoAmadi10/lnaudit/blob/main/LICENSE">License</${Link}>
                  <${Text} as="span"> | </${Text}>
                  <${Link} href="https://github.com/NonsoAmadi10/lnaudit/blob/main/SECURITY.md">Security Policy</${Link}>
                  <${Text} as="span"> | </${Text}>
                  <${Link} href="https://github.com/NonsoAmadi10/lnaudit/blob/main/docs/POST-MORTEM.md">Research</${Link}>
                </${Text}>
              </${Box}>
            </${Stack}>
          </${GridItem}>
        </${Grid}>
      </${Box}>
    `;

    createRoot(document.getElementById("root")).render(
      html`<${ChakraProvider} theme=${theme}><${App} /></${ChakraProvider}>`
    );
  </script>
</body>
</html>

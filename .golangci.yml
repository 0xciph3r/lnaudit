version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
  settings:
    gocritic:
      disabled-checks:
        - hugeParam
        - filepathJoin
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      excludes:
        - G304
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
